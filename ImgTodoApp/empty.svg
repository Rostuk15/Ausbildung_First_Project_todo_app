<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone -->
  <rect x="150" y="50" width="100" height="180" rx="20" stroke="#4F46E5" stroke-width="3"></rect>

  <!-- Title -->
  <text x="200" y="80" text-anchor="middle" fill="#4F46E5" font-size="14" font-family="Arial">TO DO</text>

  <!-- Checkboxes -->
  <rect x="165" y="100" width="15" height="15" stroke="#10B981" stroke-width="2"></rect>
  <line x1="168" y1="108" x2="175" y2="115" stroke="#10B981" stroke-width="2"></line>
  <line x1="175" y1="115" x2="182" y2="100" stroke="#10B981" stroke-width="2"></line>

  <rect x="165" y="130" width="15" height="15" stroke="#10B981" stroke-width="2"></rect>
  <line x1="168" y1="138" x2="175" y2="145" stroke="#10B981" stroke-width="2"></line>
  <line x1="175" y1="145" x2="182" y2="130" stroke="#10B981" stroke-width="2"></line>

  <rect x="165" y="160" width="15" height="15" stroke="#9CA3AF" stroke-width="2"></rect>

  <!-- Lines -->
  <line x1="190" y1="108" x2="230" y2="108" stroke="#9CA3AF" stroke-width="2"></line>
  <line x1="190" y1="138" x2="230" y2="138" stroke="#9CA3AF" stroke-width="2"></line>
  <line x1="190" y1="168" x2="230" y2="168" stroke="#9CA3AF" stroke-width="2"></line>

  <!-- Person left -->
  <circle cx="80" cy="120" r="25" stroke="#4F46E5" stroke-width="3"></circle>
  <line x1="80" y1="145" x2="80" y2="190" stroke="#4F46E5" stroke-width="3"></line>
  <line x1="80" y1="160" x2="60" y2="180" stroke="#4F46E5" stroke-width="3"></line>

  <!-- Person right -->
  <circle cx="320" cy="120" r="25" stroke="#4F46E5" stroke-width="3"></circle>
  <line x1="320" y1="145" x2="320" y2="190" stroke="#4F46E5" stroke-width="3"></line>
  <line x1="320" y1="160" x2="300" y2="180" stroke="#4F46E5" stroke-width="3"></line>

</svg>