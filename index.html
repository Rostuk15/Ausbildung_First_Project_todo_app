<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6f91">
    <link rel="stylesheet" href="style.css">
    <!-- Font --> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">    
    <title>Todo-App</title>
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>To-Do App</h1>
            <div class="stat-container">
                <div class="details">
                    <h3>Keep it Up!</h3>
                    <div id="progressbar">
                        <div id="progress"></div>
                    </div>
                </div>
                <div class="stat-number">
                    <p id="numbers">0 / 0</p>
                </div>   
            </div>
            <div class="input-area">
                <input type="text" id="task_input" placeholder="Add new task...">
                <button type="submit" id="add_task_btn"  class="fa-solid fa-plus"></button>
            </div>
            <div class="todos-container">
                <ul id="task_list"></ul>
                <img class="empty_img" src="./ImgTodoApp/empty.svg" alt="empty">
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.9.1/tsparticles.confetti.bundle.min.js"></script>
<!--<script src="script.js"></script>-->
<script src="js/storage.js"></script>
<script src="js/progress.js"></script>
<script src="js/dragAndDropV2.js"></script>
<script src="js/task.js"></script>
<script src="js/main.js"></script>
</html>
